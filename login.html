<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>로그인 | ReadFlow</title>

  <link rel="stylesheet" href="css/common.css">
  <link rel="stylesheet" href="css/login.css">
</head>

<body>
  <div id="navbar"></div>

  <main class="auth-page">
    <section class="auth-card" aria-label="로그인">
      <img src="assets/icons/logo-full.svg" alt="ReadFlow" class="auth-logo">

      <h1 class="auth-title">
        ReadFlow에 오신 것을<br>
        환영합니다
      </h1>

      <div class="social-login-group">
        <button type="button" class="social-btn">
            <img src="assets/img/google_logo.png" alt="" class="social-icon">
            <span>Google로 계속하기</span>
        </button>

        <button type="button" class="social-btn">
            <img src="assets/img/apple_logo.png" alt="" class="social-icon">
            <span>Apple로 계속하기</span>
        </button>

        <button type="button" class="social-btn">
            <img src="assets/img/facebook_logo.png" alt="" class="social-icon">
            <span>Facebook로 계속하기</span>
        </button>
        </div>

      <div class="divider">
        <span></span>
        <p>or</p>
        <span></span>
      </div>

      <form class="auth-form">
        <input type="email" placeholder="이메일" class="auth-input">

        <div class="password-field">
          <input type="password" placeholder="비밀번호" class="auth-input">
          <button type="button" class="password-toggle" aria-label="비밀번호 보기">
            <span>◎</span>
          </button>
        </div>

        <button type="submit" class="auth-submit">로그인</button>
      </form>

      <a href="#" class="forgot-link">비밀번호를 잊으셨나요?</a>

      <p class="auth-switch">
        아직 계정이 없으신가요?
        <a href="signup.html">계정 만들기</a>
      </p>
    </section>

    <p class="auth-notice">
      계속 진행하면 이용 약관 및 개인정보 처리방침에 동의하는 것으로 간주됩니다.
    </p>
  </main>

  <script src="js/common.js"></script>
</body>
</html>
