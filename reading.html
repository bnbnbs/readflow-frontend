<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ReadFlow - 읽기</title>

  <link rel="stylesheet" href="./css/common.css" />
  <link rel="stylesheet" href="./css/reading.css" />
</head>

<body>
  <div id="navbar"></div>

  <main class="reading-page">
    <section class="reading-container">

      <!-- 파일 정보 -->
      <section class="file-info-box" id="fileInfoBox" data-status="complete">
        <img src="./assets/icons/file-text.svg" class="file-icon" />

        <div class="file-text-area">
          <p class="file-name" id="fileName">우주의 모든 것.pdf</p>
          <div class="upload-status">
            <span class="status-dot"></span>
            <span class="status-text" id="uploadStatusText">업로드 완료</span>
          </div>
        </div>

        <button class="reupload-button" id="reuploadButton">
          다른 자료 업로드
        </button>

        <input type="file" id="fileInput" hidden />
      </section>

      <!-- 전체 레이아웃 -->
      <section class="reading-layout">

        <!-- 🔥 왼쪽 패널 (목차 제거됨) -->
        <aside class="left-panel">

          <!-- 학습 설정 -->
          <section class="setting-box">
            <h2 class="panel-title">학습 설정</h2>

            <div class="setting-grid">
              <div class="setting-item">
                <p class="setting-label">글자 크기</p>
                <div class="control-box">
                  <button id="fontMinus">-</button>
                  <span id="fontSizeValue">22</span>
                  <button id="fontPlus">+</button>
                </div>
              </div>
            </div>

            <div class="highlight-setting">
              <p class="setting-label">하이라이트 색상</p>
              <div class="color-panel" id="colorPanel">
                <button class="color-circle active" data-color="#FBDE84"></button>
                <button class="color-circle" data-color="#8FE9C9"></button>
                <button class="color-circle" data-color="#9DDBFA"></button>
                <button class="color-circle" data-color="#FEA3AC"></button>
                <button class="color-circle" data-color="#B5A2DC"></button>
              </div>
            </div>
          </section>

          <!-- 진행률 -->
          <section class="progress-box">
            <h2 class="panel-title">진행률</h2>

            <div class="progress-info">
              <span>전체 진행률</span>
              <strong id="progressPercent">0%</strong>
            </div>

            <div class="progress-bar">
              <div class="progress-fill" id="progressFill"></div>
            </div>
          </section>

        </aside>

        <!-- 오른쪽 읽기 영역 -->
        <section class="reader-box" id="readerBox">

          <!-- 상단 -->
          <div class="reader-topbar">
            <div class="reader-tabs">
              <button class="reader-tab active">읽기</button>
              <button class="reader-tab">요약</button>
            </div>
          </div>

          <!-- 본문 -->
          <div class="reader-content" id="readerContent"></div>

          <!-- 플레이어 -->
          <section class="reader-player" id="readerPlayer">

            <div class="player-left">
              <div class="player-cover">
                <img src="./assets/icons/logo-only.svg" />
              </div>
              <div class="player-info">
                <p class="player-title" id="playerTitle">현재 오디오</p>
                <p class="player-subtitle">읽는 중</p>
              </div>
            </div>

            <!-- 컨트롤 -->
            <div class="player-controls">
              <button class="player-skip-button">◀</button>
              <button class="player-play-button" id="playButton">▶</button>
              <button class="player-skip-button">▶</button>
            </div>

            <!-- 진행바 -->
            <div class="player-progress-area">
              <span id="currentTime">00:00</span>

              <input
                type="range"
                id="audioProgress"
                class="player-progress"
                min="0"
                max="100"
                value="0"
              />

              <span id="totalTime">00:00</span>
            </div>

            <!-- 볼륨 -->
            <div class="player-volume">
              <img src="./assets/icons/volume.svg" />
              <input
                type="range"
                id="volumeRange"
                class="volume-range"
                min="0"
                max="100"
                value="70"
              />
            </div>

          </section>

        </section>

      </section>
    </section>
  </main>

  <div id="footer"></div>

  <script src="./js/common.js"></script>
  <script src="./js/reading.js"></script>
</body>
</html>
